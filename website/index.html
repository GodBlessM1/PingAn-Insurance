<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平安寿险收益分析平台 | 智能数据分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        
        :root {
            --primary-orange: #FF6B35;
            --secondary-orange: #FF8C42;
            --light-orange: #FFF0E6;
            --dark-orange: #E85D04;
            --accent-yellow: #FFB627;
            --bg-cream: #FFFBF7;
        }
        
        body {
            background: linear-gradient(135deg, #FFFBF7 0%, #FFF0E6 50%, #FFE4D6 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 53, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 50%, #FFB627 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }
        
        .nav-item {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #FF6B35, #FFB627);
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .nav-item:hover::after,
        .nav-item.active::after {
            width: 100%;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
        }
        
        .chart-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.1);
            transition: all 0.3s ease;
        }
        
        .chart-container:hover {
            box-shadow: 0 8px 40px rgba(255, 107, 53, 0.15);
            transform: translateY(-5px);
        }
        
        .data-table th {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
        }
        
        .data-table tr:hover {
            background: linear-gradient(90deg, #FFF0E6 0%, transparent 100%);
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .scroll-indicator {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #FF6B35, #FFB627);
            z-index: 9999;
            transition: width 0.1s;
        }
        
        .page-section {
            display: none;
        }
        
        .page-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .interactive-chart {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .interactive-chart:hover {
            transform: scale(1.02);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
    </style>
</head>
<body class="text-gray-800">
    <!-- 滚动进度条 -->
    <div class="scroll-indicator" id="scrollProgress"></div>
    
    <!-- 顶部导航 -->
    <nav class="fixed top-0 w-full z-50 glass-card shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-yellow-500 flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold gradient-text">平安寿险收益分析</span>
                </div>
                
                <div class="hidden md:flex space-x-8">
                    <a href="#" onclick="showPage('overview')" class="nav-item text-gray-700 hover:text-orange-600 font-medium">概览</a>
                    <a href="#" onclick="showPage('trends')" class="nav-item text-gray-700 hover:text-orange-600 font-medium">趋势分析</a>
                    <a href="#" onclick="showPage('distribution')" class="nav-item text-gray-700 hover:text-orange-600 font-medium">分布分析</a>
                    <a href="#" onclick="showPage('heatmap')" class="nav-item text-gray-700 hover:text-orange-600 font-medium">热力图</a>
                    <a href="#" onclick="showPage('ml')" class="nav-item text-gray-700 hover:text-orange-600 font-medium">ML预测</a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">数据更新: 2026-03-22</span>
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="pt-20 pb-10 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        
        <!-- 概览页面 -->
        <div id="overview" class="page-section active animate-fade-in">
            <!-- 欢迎区域 -->
            <div class="glass-card rounded-2xl p-8 mb-8 text-center">
                <h1 class="text-4xl font-bold gradient-text mb-4">平安寿险收益分析平台</h1>
                <p class="text-xl text-gray-600 mb-6">基于机器学习的智能数据分析与预测系统</p>
                <div class="flex justify-center space-x-4">
                    <button onclick="startAnalysis()" class="btn-primary px-6 py-3 rounded-xl text-white font-medium">
                        <i class="fas fa-play mr-2"></i>开始分析
                    </button>
                    <button onclick="exportReport()" class="px-6 py-3 rounded-xl border-2 border-orange-500 text-orange-600 font-medium hover:bg-orange-50">
                        <i class="fas fa-download mr-2"></i>导出报告
                    </button>
                </div>
            </div>
            
            <!-- 关键指标卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="stat-card rounded-2xl p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-orange-100 text-sm">平均收益率</p>
                            <p class="text-3xl font-bold">3.85%</p>
                        </div>
                        <i class="fas fa-chart-line text-3xl text-orange-200"></i>
                    </div>
                    <div class="mt-4 text-orange-100 text-sm">
                        <span class="bg-orange-400 bg-opacity-30 px-2 py-1 rounded">+0.15%</span>
                        较上月
                    </div>
                </div>
                
                <div class="stat-card rounded-2xl p-6 text-white" style="background: linear-gradient(135deg, #FF8C42 0%, #FFB627 100%);">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-orange-100 text-sm">风险评级</p>
                            <p class="text-3xl font-bold">A级</p>
                        </div>
                        <i class="fas fa-shield-alt text-3xl text-orange-200"></i>
                    </div>
                    <div class="mt-4 text-orange-100 text-sm">
                        <span class="bg-orange-400 bg-opacity-30 px-2 py-1 rounded">低风险</span>
                        稳定收益
                    </div>
                </div>
                
                <div class="stat-card rounded-2xl p-6 text-white" style="background: linear-gradient(135deg, #FFB627 0%, #FFD93D 100%);">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-orange-100 text-sm">保单数量</p>
                            <p class="text-3xl font-bold">20</p>
                        </div>
                        <i class="fas fa-file-contract text-3xl text-orange-200"></i>
                    </div>
                    <div class="mt-4 text-orange-100 text-sm">
                        <span class="bg-orange-400 bg-opacity-30 px-2 py-1 rounded">5</span>
                        本月新增
                    </div>
                </div>
                
                <div class="stat-card rounded-2xl p-6 text-white" style="background: linear-gradient(135deg, #E85D04 0%, #FF6B35 100%);">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-orange-100 text-sm">预测准确率</p>
                            <p class="text-3xl font-bold">94.2%</p>
                        </div>
                        <i class="fas fa-brain text-3xl text-orange-200"></i>
                    </div>
                    <div class="mt-4 text-orange-100 text-sm">
                        <span class="bg-orange-400 bg-opacity-30 px-2 py-1 rounded">ML模型</span>
                        智能预测
                    </div>
                </div>
            </div>
            
            <!-- 快速分析区域 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-chart-bar text-orange-500 mr-2"></i>收益趋势概览
                    </h3>
                    <div class="chart-container p-4">
                        <canvas id="overviewChart" width="400" height="200"></canvas>
                    </div>
                </div>
                
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-pie-chart text-orange-500 mr-2"></i>产品类型分布
                    </h3>
                    <div class="chart-container p-4">
                        <canvas id="productChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 趋势分析页面 -->
        <div id="trends" class="page-section">
            <div class="glass-card rounded-2xl p-8 mb-8">
                <h2 class="text-3xl font-bold gradient-text mb-6">趋势分析</h2>
                <div class="flex space-x-4 mb-6">
                    <button onclick="updateTrendChart('1year')" class="px-4 py-2 bg-orange-500 text-white rounded-lg">1年</button>
                    <button onclick="updateTrendChart('3year')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-orange-100">3年</button>
                    <button onclick="updateTrendChart('5year')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-orange-100">5年</button>
                </div>
                <div class="chart-container p-6">
                    <canvas id="trendChart" width="800" height="400"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 分布分析页面 -->
        <div id="distribution" class="page-section">
            <div class="glass-card rounded-2xl p-8 mb-8">
                <h2 class="text-3xl font-bold gradient-text mb-6">分布分析</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="chart-container p-6">
                        <h3 class="text-lg font-semibold mb-4">IRR分布</h3>
                        <canvas id="irrDistributionChart" width="400" height="300"></canvas>
                    </div>
                    <div class="chart-container p-6">
                        <h3 class="text-lg font-semibold mb-4">风险分布</h3>
                        <canvas id="riskDistributionChart" width="400" height="300"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 热力图页面 -->
        <div id="heatmap" class="page-section">
            <div class="glass-card rounded-2xl p-8 mb-8">
                <h2 class="text-3xl font-bold gradient-text mb-6">热力图分析</h2>
                <div class="chart-container p-6">
                    <img src="charts/heatmap_irr.png" alt="IRR热力图" class="w-full rounded-lg interactive-chart" onclick="openModal(this)">
                </div>
            </div>
        </div>
        
        <!-- ML预测页面 -->
        <div id="ml" class="page-section">
            <div class="glass-card rounded-2xl p-8 mb-8">
                <h2 class="text-3xl font-bold gradient-text mb-6">机器学习预测</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="chart-container p-6">
                        <h3 class="text-lg font-semibold mb-4">收益预测</h3>
                        <canvas id="mlPredictionChart" width="400" height="300"></canvas>
                    </div>
                    <div class="chart-container p-6">
                        <h3 class="text-lg font-semibold mb-4">风险预警</h3>
                        <canvas id="mlRiskChart" width="400" height="300"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- 模态框 -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <img id="modalImage" src="" alt="" class="max-w-full max-h-full rounded-lg">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white bg-black bg-opacity-50 rounded-full p-2">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    
    <!-- 底部 -->
    <footer class="glass-card text-center py-8">
        <div class="max-w-7xl mx-auto px-4">
            <p class="text-gray-600">© 2026 平安寿险收益分析平台 | 基于机器学习的数据分析系统</p>
            <div class="mt-4 flex justify-center space-x-6">
                <a href="#" class="text-orange-600 hover:text-orange-800"><i class="fab fa-github text-xl"></i></a>
                <a href="#" class="text-orange-600 hover:text-orange-800"><i class="fab fa-linkedin text-xl"></i></a>
                <a href="#" class="text-orange-600 hover:text-orange-800"><i class="fas fa-envelope text-xl"></i></a>
            </div>
        </div>
    </footer>
    
    <script>
        // 页面切换
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
            
            // 更新导航状态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // 滚动进度条
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset;
            const docHeight = document.body.offsetHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            document.getElementById('scrollProgress').style.width = scrollPercent + '%';
        });
        
        // 模态框
        function openModal(img) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.classList.add('active');
            modalImg.src = img.src;
        }
        
        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }
        
        // 图表数据
        const chartData = {
            overview: {
                labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                datasets: [{
                    label: '平均收益率',
                    data: [3.2, 3.5, 3.8, 3.6, 3.9, 4.1],
                    borderColor: '#FF6B35',
                    backgroundColor: 'rgba(255, 107, 53, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            products: {
                labels: ['传统寿险', '分红险', '万能险', '投连险', '年金险'],
                datasets: [{
                    data: [20, 20, 20, 20, 20],
                    backgroundColor: ['#FF6B35', '#FF8C42', '#FFB627', '#FFD93D', '#FFE066']
                }]
            },
            trends: {
                '1year': {
                    labels: ['2026-01', '2026-02', '2026-03', '2026-04', '2026-05', '2026-06'],
                    datasets: [
                        {
                            label: '传统寿险',
                            data: [3.6, 3.7, 3.8, 3.7, 3.9, 4.0],
                            borderColor: '#FF6B35',
                            backgroundColor: 'rgba(255, 107, 53, 0.1)'
                        },
                        {
                            label: '分红险',
                            data: [3.8, 3.9, 4.0, 3.9, 4.1, 4.2],
                            borderColor: '#FF8C42',
                            backgroundColor: 'rgba(255, 140, 66, 0.1)'
                        },
                        {
                            label: '万能险',
                            data: [4.0, 4.1, 4.2, 4.1, 4.3, 4.4],
                            borderColor: '#FFB627',
                            backgroundColor: 'rgba(255, 182, 39, 0.1)'
                        }
                    ]
                },
                '3year': {
                    labels: ['2024', '2025', '2026'],
                    datasets: [
                        {
                            label: '传统寿险',
                            data: [3.5, 3.7, 4.0],
                            borderColor: '#FF6B35',
                            backgroundColor: 'rgba(255, 107, 53, 0.1)'
                        },
                        {
                            label: '分红险',
                            data: [3.7, 3.9, 4.2],
                            borderColor: '#FF8C42',
                            backgroundColor: 'rgba(255, 140, 66, 0.1)'
                        },
                        {
                            label: '万能险',
                            data: [3.9, 4.1, 4.4],
                            borderColor: '#FFB627',
                            backgroundColor: 'rgba(255, 182, 39, 0.1)'
                        }
                    ]
                },
                '5year': {
                    labels: ['2022', '2023', '2024', '2025', '2026'],
                    datasets: [
                        {
                            label: '传统寿险',
                            data: [3.2, 3.4, 3.6, 3.8, 4.0],
                            borderColor: '#FF6B35',
                            backgroundColor: 'rgba(255, 107, 53, 0.1)'
                        },
                        {
                            label: '分红险',
                            data: [3.4, 3.6, 3.8, 4.0, 4.2],
                            borderColor: '#FF8C42',
                            backgroundColor: 'rgba(255, 140, 66, 0.1)'
                        },
                        {
                            label: '万能险',
                            data: [3.6, 3.8, 4.0, 4.2, 4.4],
                            borderColor: '#FFB627',
                            backgroundColor: 'rgba(255, 182, 39, 0.1)'
                        }
                    ]
                }
            }
        };
        
        // 存储图表实例
        let trendChartInstance = null;
        
        // 初始化图表
        function initCharts() {
            // 概览图表
            const overviewCtx = document.getElementById('overviewChart');
            if (overviewCtx) {
                new Chart(overviewCtx, {
                    type: 'line',
                    data: chartData.overview,
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false },
                            title: { display: true, text: '月度收益率趋势' }
                        },
                        scales: {
                            y: { beginAtZero: false, min: 3.0, max: 4.5 }
                        }
                    }
                });
            }
            
            // 产品分布图表
            const productCtx = document.getElementById('productChart');
            if (productCtx) {
                new Chart(productCtx, {
                    type: 'doughnut',
                    data: chartData.products,
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            }
            
            // 趋势图表
            const trendCtx = document.getElementById('trendChart');
            if (trendCtx) {
                trendChartInstance = new Chart(trendCtx, {
                    type: 'line',
                    data: chartData.trends['1year'],
                    options: {
                        responsive: true,
                        plugins: {
                            title: { display: true, text: '年度收益率对比' }
                        },
                        scales: {
                            y: { beginAtZero: false, min: 3.0, max: 5.0 }
                        }
                    }
                });
            }
            
            // 分布图表
            const irrDistCtx = document.getElementById('irrDistributionChart');
            if (irrDistCtx) {
                new Chart(irrDistCtx, {
                    type: 'bar',
                    data: {
                        labels: ['0-2%', '2-3%', '3-4%', '4-5%', '5%+'],
                        datasets: [{
                            label: '保单数量',
                            data: [50, 200, 500, 300, 100],
                            backgroundColor: ['#FF6B35', '#FF8C42', '#FFB627', '#FFD93D', '#FFE066']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: { display: true, text: 'IRR分布' }
                        }
                    }
                });
            }
            
            // 风险分布图表
            const riskDistCtx = document.getElementById('riskDistributionChart');
            if (riskDistCtx) {
                new Chart(riskDistCtx, {
                    type: 'pie',
                    data: {
                        labels: ['低风险', '中风险', '高风险'],
                        datasets: [{
                            data: [65, 25, 10],
                            backgroundColor: ['#4CAF50', '#FFB627', '#FF6B35']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: { display: true, text: '风险分布' },
                            legend: { position: 'bottom' }
                        }
                    }
                });
            }
            
            // ML预测图表
            const mlPredCtx = document.getElementById('mlPredictionChart');
            if (mlPredCtx) {
                new Chart(mlPredCtx, {
                    type: 'line',
                    data: {
                        labels: ['当前', '1月后', '3月后', '6月后', '1年后'],
                        datasets: [
                            {
                                label: '预测收益',
                                data: [4.1, 4.2, 4.3, 4.5, 4.7],
                                borderColor: '#FF6B35',
                                backgroundColor: 'rgba(255, 107, 53, 0.1)'
                            },
                            {
                                label: '置信区间上限',
                                data: [4.3, 4.4, 4.5, 4.7, 4.9],
                                borderColor: '#FFB627',
                                borderDash: [5, 5],
                                fill: false
                            },
                            {
                                label: '置信区间下限',

                    const imgWidth = 210;
                    const pageHeight = 295;
                    const imgHeight = canvas.height * imgWidth / canvas.width;
                    let heightLeft = imgHeight;
                    let position = 0;
                    
                    // 添加第一页
                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                    
                    // 处理多页
                    while (heightLeft >= 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                        heightLeft -= pageHeight;
                    }

        // 显示通知函数

            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `fixed top-20 right-4 px-6 py-4 rounded-lg shadow-lg z-50 transition-all duration-300 transform translate-y-0 opacity-100`;
            
            // 根据类型设置样式
            if (type === 'success') {
                notification.className += ' bg-green-500 text-white';
            } else if (type === 'error') {
                notification.className += ' bg-red-500 text-white';
            } else {
                notification.className += ' bg-blue-500 text-white';
            }
            
            notification.innerHTML = `
                <div class="flex items-center">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} mr-2"></i>
                    <span>${message}</span>
                </div>
            `;
            
            // 添加到页面
            document.body.appendChild(notification);
            
            // 3秒后移除
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    if (document.body.contains(notification)) {
                        document.body.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }
